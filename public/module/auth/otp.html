<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email — EBI Expiry Alert System</title>
  <meta name="description" content="Verify your email address to access EBI AI-Powered Product Expiry Alert Management System."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-base: #020c08; --bg-surface: #041410; --bg-elevated: #061a10;
      --green-400: #00e676; --green-500: #00c853; --green-600: #009624;
      --green-dim: rgba(0,230,118,0.08); --green-glow: rgba(0,230,118,0.25);
      --text-primary: #e8fdf0; --text-secondary: #7db88e; --text-muted: #3d6b4a;
      --border: rgba(0,230,118,0.15);
      --font-body: 'Inter', sans-serif; --font-display: 'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: var(--font-body); background: var(--bg-base); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; padding: 24px; }
    a { text-decoration: none; color: inherit; }

    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18; animation: float 14s ease-in-out infinite alternate; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #00e676, transparent 65%); top: -200px; left: -150px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #00c853, transparent 65%); bottom: -100px; right: -100px; animation-delay: -7s; opacity: 0.12; }
    @keyframes float { from { transform: translate(0,0); } to { transform: translate(30px, 35px); } }
    .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px); background-size: 60px 60px; }

    /* OTP CARD */
    .otp-card {
      position: relative; z-index: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px;
      width: 100%; max-width: 480px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 48px rgba(0,230,118,0.06);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

    /* Logo */
    .card-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 36px;
    }
    .logo-icon { width: 44px; height: 44px; border-radius: 11px; background: linear-gradient(135deg, var(--green-400), var(--green-600)); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 24px var(--green-glow); }
    .logo-text { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--green-400); }

    /* Shield icon */
    .shield-wrap {
      width: 88px; height: 88px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,230,118,0.15), rgba(0,230,118,0.03));
      border: 1.5px solid rgba(0,230,118,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 40px;
      box-shadow: 0 0 40px rgba(0,230,118,0.12);
      animation: pulse-shield 3s ease-in-out infinite;
    }
    @keyframes pulse-shield {
      0%, 100% { box-shadow: 0 0 40px rgba(0,230,118,0.12); }
      50% { box-shadow: 0 0 60px rgba(0,230,118,0.25); }
    }

    .otp-card h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 10px; }
    .otp-card .subtitle { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 6px; }
    .email-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-dim); border: 1px solid var(--border);
      border-radius: 9999px; padding: 4px 14px;
      font-size: 13px; font-weight: 600; color: var(--green-400);
      margin-bottom: 32px;
    }

    /* OTP Inputs */
    .otp-inputs {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 28px;
    }
    .otp-input {
      width: 58px; height: 68px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: var(--font-display); font-size: 26px; font-weight: 700;
      color: var(--text-primary); text-align: center;
      outline: none; caret-color: var(--green-400);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      -moz-appearance: textfield;
    }
    .otp-input::-webkit-outer-spin-button,
    .otp-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .otp-input:focus {
      border-color: var(--green-400);
      box-shadow: 0 0 0 3px rgba(0,230,118,0.12), 0 0 16px rgba(0,230,118,0.15);
      transform: translateY(-2px);
    }
    .otp-input.filled { border-color: rgba(0,230,118,0.4); background: rgba(0,230,118,0.05); }
    .otp-input.error { border-color: rgba(239,68,68,0.5); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }

    /* Timer */
    .timer-row { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 28px; }
    .timer-val { color: var(--green-400); font-weight: 700; font-size: 16px; }
    .timer-expired { display: none; }
    .resend-link { background: none; border: none; color: var(--green-400); font-size: 13.5px; font-weight: 600; cursor: pointer; text-decoration: underline; font-family: inherit; }
    .resend-link:hover { color: #69f0ae; }

    /* Error */
    .error-box { display: none; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-bottom: 16px; }
    .error-box.show { display: block; }
    .success-box { display: none; background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.25); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--green-400); margin-bottom: 16px; }
    .success-box.show { display: block; }

    /* Verify Button */
    .btn-primary { width: 100%; padding: 14px; border-radius: 11px; background: linear-gradient(135deg, var(--green-400), var(--green-600)); color: #020c08; font-size: 15px; font-weight: 800; border: none; cursor: pointer; box-shadow: 0 4px 24px var(--green-glow); transition: all 0.2s ease; font-family: inherit; margin-bottom: 20px; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 32px var(--green-glow); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(2,12,8,0.3); border-top-color: #020c08; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link { font-size: 13px; color: var(--text-muted); }
    .back-link a { color: var(--text-secondary); font-weight: 500; }
    .back-link a:hover { color: var(--green-400); }

    /* Dots progress */
    .otp-progress { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; }
    .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); transition: all 0.2s; }
    .prog-dot.active { background: var(--green-400); box-shadow: 0 0 8px var(--green-400); }

    @media (max-width: 520px) {
      .otp-card { padding: 40px 24px; }
      .otp-input { width: 46px; height: 56px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="bg-grid"></div>

  <div class="otp-card">
    <!-- Logo -->
    <div class="card-logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">EBI System</div>
    </div>

    <!-- Shield -->
    <div class="shield-wrap">🛡️</div>

    <h1>Verify Your Email</h1>
    <p class="subtitle">We sent a 6-digit verification code to</p>
    <div class="email-badge">✉️ <span id="emailDisplay">your email address</span></div>

    <!-- Progress dots -->
    <div class="otp-progress" id="progressDots">
      <div class="prog-dot" data-idx="0"></div>
      <div class="prog-dot" data-idx="1"></div>
      <div class="prog-dot" data-idx="2"></div>
      <div class="prog-dot" data-idx="3"></div>
      <div class="prog-dot" data-idx="4"></div>
      <div class="prog-dot" data-idx="5"></div>
    </div>

    <!-- OTP Inputs -->
    <div class="otp-inputs" id="otpInputs">
      <input class="otp-input" type="number" id="otp0" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 1"/>
      <input class="otp-input" type="number" id="otp1" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 2"/>
      <input class="otp-input" type="number" id="otp2" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 3"/>
      <input class="otp-input" type="number" id="otp3" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 4"/>
      <input class="otp-input" type="number" id="otp4" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 5"/>
      <input class="otp-input" type="number" id="otp5" maxlength="1" min="0" max="9" inputmode="numeric" aria-label="Digit 6"/>
    </div>

    <!-- Timer -->
    <div class="timer-row">
      <span id="timerText">Code expires in <span class="timer-val" id="timerVal">02:00</span></span>
      <span class="timer-expired" id="timerExpired">
        Code expired. <button class="resend-link" onclick="resendCode()">Resend code</button>
      </span>
    </div>

    <!-- Messages -->
    <div class="error-box" id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <!-- Button -->
    <button class="btn-primary" id="verifyBtn" onclick="verifyOTP()">
      <span id="btnText">Verify Email</span>
      <span id="btnLoading" style="display:none;"><span class="spinner"></span>Verifying...</span>
    </button>

    <div class="back-link">
      Wrong email? <a href="register.html">← Go back</a>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../../shared/js/supabase.js';

    // --- Email display from sessionStorage (set by register.html) ---
    const storedEmail = sessionStorage.getItem('reg_email') || 'you@example.com';
    document.getElementById('emailDisplay').textContent = storedEmail;

    // --- OTP Input Behavior ---
    const inputs = Array.from(document.querySelectorAll('.otp-input'));
    const dots = Array.from(document.querySelectorAll('.prog-dot'));

    inputs.forEach((input, idx) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val.slice(-1);
        updateProgress();
        if (val && idx < 5) inputs[idx + 1].focus();
        if (val) input.classList.add('filled');
        else input.classList.remove('filled');
        clearErrors();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && idx > 0) {
          inputs[idx - 1].focus();
          inputs[idx - 1].value = '';
          inputs[idx - 1].classList.remove('filled');
          updateProgress();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasted.split('').forEach((char, i) => {
          if (inputs[i]) { inputs[i].value = char; inputs[i].classList.add('filled'); }
        });
        updateProgress();
        if (pasted.length < 6) inputs[pasted.length].focus();
        else inputs[5].focus();
      });
    });

    function updateProgress() {
      inputs.forEach((inp, i) => {
        dots[i].classList.toggle('active', !!inp.value);
      });
    }

    function getOTPValue() {
      return inputs.map(i => i.value).join('');
    }

    function clearErrors() {
      document.getElementById('errorBox').classList.remove('show');
      inputs.forEach(i => i.classList.remove('error'));
    }

    // --- Countdown Timer ---
    let seconds = 600; // 10 minutes
    const timerVal = document.getElementById('timerVal');
    const timerText = document.getElementById('timerText');
    const timerExpired = document.getElementById('timerExpired');

    function formatTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    const timerInterval = setInterval(() => {
      seconds--;
      timerVal.textContent = formatTime(seconds);
      if (seconds <= 0) {
        clearInterval(timerInterval);
        timerText.style.display = 'none';
        timerExpired.style.display = 'inline';
      }
    }, 1000);

    // --- Resend OTP via Supabase ---
    window.resendCode = async function() {
      const successBox = document.getElementById('successBox');
      const errorBox = document.getElementById('errorBox');
      successBox.classList.remove('show');
      errorBox.classList.remove('show');

      const { error } = await supabase.auth.resend({
        type: 'signup',
        email: storedEmail
      });

      if (error) {
        errorBox.textContent = '⚠️ ' + error.message;
        errorBox.classList.add('show');
      } else {
        seconds = 600;
        timerVal.textContent = formatTime(seconds);
        timerText.style.display = 'inline';
        timerExpired.style.display = 'none';
        inputs.forEach(i => { i.value = ''; i.classList.remove('filled', 'error'); });
        updateProgress();
        successBox.textContent = '✅ A new code has been sent to your email.';
        successBox.classList.add('show');
        setTimeout(() => successBox.classList.remove('show'), 3000);
        const interval = setInterval(() => {
          seconds--;
          timerVal.textContent = formatTime(seconds);
          if (seconds <= 0) {
            clearInterval(interval);
            timerText.style.display = 'none';
            timerExpired.style.display = 'inline';
          }
        }, 1000);
      }
    }

    // --- Verify OTP with Supabase ---
    window.verifyOTP = async function() {
      const btn = document.getElementById('verifyBtn');
      const btnText = document.getElementById('btnText');
      const btnLoading = document.getElementById('btnLoading');
      const successBox = document.getElementById('successBox');
      const errorBox = document.getElementById('errorBox');
      successBox.classList.remove('show');
      errorBox.classList.remove('show');

      const token = inputs.map(i => i.value).join('');
      if (token.length < 6) {
        errorBox.textContent = '⚠️ Please enter all 6 digits.';
        errorBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      btnLoading.style.display = 'inline';

      const { error } = await supabase.auth.verifyOtp({
        email: storedEmail,
        token,
        type: 'email'
      });

      if (error) {
        inputs.forEach(i => i.classList.add('error'));
        errorBox.textContent = '⚠️ ' + error.message;
        errorBox.classList.add('show');
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnLoading.style.display = 'none';
      } else {
        sessionStorage.removeItem('reg_email');
        successBox.textContent = '✅ Email verified! Redirecting to dashboard...';
        successBox.classList.add('show');
        setTimeout(() => window.location.href = '../dashboard/dashboard.html', 800);
      }
    }

    inputs[0].focus();
  </script>
</body>
</html>
