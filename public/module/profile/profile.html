<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — EBI Expiry Alert System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./profile.css" />
</head>

<body>
  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">🌿</div>
      <div>
        <div class="sb-logo-text">EBI System</div>
        <div class="sb-logo-sub">AI Expiry Guard</div>
      </div>
    </div>
    <nav class="sb-nav">
      <a class="sb-link" href="../dashboard/dashboard.html"><span class="sb-icon">📊</span> Dashboard</a>
      <a class="sb-link" href="../inventory/inventory.html"><span class="sb-icon">📦</span> Inventory</a>
      <a class="sb-link" href="../add_product/add_product.html"><span class="sb-icon">➕</span> Add Product</a>
      <a class="sb-link" href="../alerts/alerts.html"><span class="sb-icon">🔔</span> Alerts <span
          class="sb-badge" id="alertBadge" style="display:none">0</span></a>
      <a class="sb-link" href="../reports/reports.html"><span class="sb-icon">📈</span> Reports</a>
      <a class="sb-link active" href="profile.html"><span class="sb-icon">👤</span> Profile</a>
    </nav>
    <div class="sb-divider"></div>
    <div class="sb-footer"><button class="sb-logout" onclick="window.handleLogout()">🚪 Logout</button></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <h1>My Profile</h1>
    </div>
    <div class="content">
      <div class="profile-wrap">

        <!-- AVATAR CARD -->
        <div class="avatar-card">
          <div class="avatar" id="avatarCircle"></div>
          <div class="avatar-info">
            <h2 id="displayName">Loading...</h2>
            <p id="displayEmail">Loading...</p>
          </div>
        </div>

        <!-- ACCOUNT INFO -->
        <div class="info-card">
          <h3>Account Information</h3>
          <div class="info-row"><span class="info-label">Full Name</span><span class="info-val"
              id="infoName">Loading...</span></div>
          <div class="info-row"><span class="info-label">Email</span><span class="info-val"
              id="infoEmail">Loading...</span></div>
          <div class="info-row"><span class="info-label">Member Since</span><span class="info-val"
              id="infoJoined">Loading...</span></div>
        </div>

        <!-- LOGOUT -->
        <button class="btn-logout-full" id="btnLogout">🚪 Logout Account</button>

      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../../shared/js/supabase.js';

    // 1. ROUTE GUARD & SESSION
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = '../auth/login.html';
    } else {
      const user = session.user;
      let fullName = user.user_metadata?.full_name || 'Anonymous User';
      const email = user.email || 'No email provided';
      const avatarUrl = user.user_metadata?.avatar_url;
      const joinedDate = new Date(user.created_at).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

      if (fullName === 'Anonymous User') {
        const { data: profile } = await supabase.from('profiles').select('full_name').eq('id', user.id).single();
        if (profile && profile.full_name) fullName = profile.full_name;
      }

      // Populate UI
      document.getElementById('displayName').textContent = fullName;
      document.getElementById('displayEmail').textContent = email;
      document.getElementById('infoName').textContent = fullName;
      document.getElementById('infoEmail').textContent = email;
      document.getElementById('infoJoined').textContent = joinedDate;

      const avatarCircle = document.getElementById('avatarCircle');
      if (avatarUrl) {
        avatarCircle.style.backgroundImage = `url('${avatarUrl}')`;
        avatarCircle.style.backgroundSize = 'cover';
        avatarCircle.style.backgroundPosition = 'center';
        avatarCircle.textContent = ''; // clear initials
      } else {
        const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        avatarCircle.textContent = initials;
      }
    }

    // Logout Handler
    window.handleLogout = async function () {
      if (confirm('Are you sure you want to logout?')) {
        await supabase.auth.signOut();
        window.location.href = '../../index.html'; // Navigate to start up page
      }
    }
    document.getElementById('btnLogout').addEventListener('click', window.handleLogout);

    // Sidebar toggle
    window.toggleSidebar = function () {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
  </script>
</body>

</html>
